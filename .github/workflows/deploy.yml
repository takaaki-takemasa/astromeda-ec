name: Deploy to Oxygen Preview

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy (Preview)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Oxygen (Preview)
        run: npx shopify hydrogen deploy --force --entry server --env preview
        env:
          SHOPIFY_HYDROGEN_FLAG: ${{ secrets.SHOPIFY_HYDROGEN_FLAG }}
          NODE_ENV: production
